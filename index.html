<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Bunga Bersenja Gurau</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a0a0a; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script>
        function setup() {
            createCanvas(windowWidth, windowHeight);
            angleMode(DEGREES);
            colorMode(HSB);
        }

        function draw() {
            // Latar belakang gradasi senja gelap
            background(10, 20, 15); 
            translate(width / 2, height / 2);

            for (let n = 0; n < 250; n++) {
                let a = n * 137.5;
                let r = 10 * sqrt(n);

                let x = r * cos(a);
                let y = r * sin(a);

                // Efek bergoyang (bersenja gurau)
                let sway = sin(frameCount * 2 + n) * 5;
                
                // Warna kelopak (Jingga, Pink, Ungu)
                fill(n % 60 + 10, 80, 100, 0.8);
                noStroke();
                
                push();
                translate(x + sway, y + sway);
                rotate(a + frameCount * 0.3);
                ellipse(0, 0, 15, 25);
                pop();
            }
            
            // Inti bunga yang bersinar
            fill(45, 100, 100);
            circle(0, 0, 30);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
